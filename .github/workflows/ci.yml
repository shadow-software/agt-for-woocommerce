name: CI

# The full quality gate — coding standards, static analysis, unit tests, and the
# official WordPress.org Plugin Check — runs on every push and pull request.
#
# Note on PHP versions: the plugin RUNTIME supports PHP 8.0+, and that is enforced
# statically by PHPCompatibility (phpcs `testVersion: 8.0-`) and PHPStan, which
# flag anything that would break on 8.0 without needing to execute there. The dev
# tooling (PHPUnit 11) requires PHP 8.2+, so CI runs on 8.2 and 8.3.
on:
  push:
    branches: [ production, main ]
  pull_request:
    branches: [ production, main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Analyse · Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Lint — WordPress Coding Standards + PHP 8.0 compatibility
        run: composer lint

      - name: Static analysis — PHPStan (level 6)
        run: composer stan

      - name: Unit tests — PHPUnit
        run: composer test

  # A fast, dependency-free PHP 8.0 syntax gate so we always know the code at
  # least parses on the minimum supported runtime, even though the test tooling
  # cannot run there.
  php80-syntax:
    name: PHP 8.0 syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up PHP 8.0
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none
      - name: php -l on every PHP file (excluding vendor)
        run: |
          find . -type f -name '*.php' -not -path './vendor/*' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null
          echo "All PHP files parse on PHP 8.0."

  # The official WordPress.org Plugin Check — the exact automated gate the
  # directory runs. Built into the release layout first (via `git archive`, so
  # dev/repo files are stripped and it is nested under the slug folder), then
  # checked at the strictest settings: include experimental checks and both
  # low-severity errors and warnings, so ANY finding at ANY level fails CI.
  plugin-check:
    name: WordPress.org Plugin Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build the release layout (export-ignore applied, nested under slug)
        run: |
          git archive --format=tar --prefix=agt-sync-for-woocommerce/ HEAD \
            | tar -x -C "${{ runner.temp }}"
          echo "PLUGIN_DIR=${{ runner.temp }}/agt-sync-for-woocommerce" >> "$GITHUB_ENV"

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ${{ env.PLUGIN_DIR }}
          slug: agt-sync-for-woocommerce
          severity: 0
          include-experimental: true
          include-low-severity-errors: true
          include-low-severity-warnings: true
